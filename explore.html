<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading</title>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

.container{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

video{
    max-width:100%;
    max-height:100%;
}
</style>
</head>
<body>

<div class="container">
    <video id="loadingVideo" autoplay muted playsinline>
        <source src="loading.mp4" type="video/mp4">
    </video>
</div>

<script>
const video = document.getElementById("loadingVideo");

video.addEventListener("ended", function() {
    window.location.href = "https://montajunpad.com/explore";
});
</script>

</body>
</html>
