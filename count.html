<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:transparent;
    font-family:'Plus Jakarta Sans',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.countdown{
    display:flex;
    gap:32px;
    text-align:center;
}

.unit{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.number{
    font-size:clamp(48px,8vw,96px);
    font-weight:700;
    line-height:1;
}

.label{
    margin-top:8px;
    font-size:14px;
    letter-spacing:1px;
    text-transform:uppercase;
    opacity:.9;
}

.days .number,
.seconds .number{
    color:#4100F5;
}

.days .label,
.seconds .label{
    color:#4100F5;
}

.hours .number,
.minutes .number,
.hours .label,
.minutes .label{
    color:#FFFFFF;
}

@media (max-width:768px){
    .countdown{
        gap:16px;
    }

    .label{
        font-size:11px;
    }
}
</style>
</head>
<body>

<div class="countdown">
    <div class="unit days">
        <div class="number" id="days">0</div>
        <div class="label">Hari</div>
    </div>

    <div class="unit hours">
        <div class="number" id="hours">00</div>
        <div class="label">Jam</div>
    </div>

    <div class="unit minutes">
        <div class="number" id="minutes">00</div>
        <div class="label">Menit</div>
    </div>

    <div class="unit seconds">
        <div class="number" id="seconds">00</div>
        <div class="label">Detik</div>
    </div>
</div>

<script>
const targetDate = new Date("2026-06-18T09:00:00+07:00");

function updateCountdown(){
    const now = new Date();
    const diff = targetDate - now;

    if(diff <= 0){
        document.getElementById("days").textContent = "0";
        document.getElementById("hours").textContent = "00";
        document.getElementById("minutes").textContent = "00";
        document.getElementById("seconds").textContent = "00";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = String(hours).padStart(2, "0");
    document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
    document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
